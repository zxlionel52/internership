<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Student Registration - EduHub</title>
    <link rel="stylesheet"  href="index.css">
   
    <style>
        .registration-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .registration-container h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section h3 {
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .required {
            color: var(--accent-color);
        }

        .form-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit, .btn-reset {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .btn-reset {
            background: #e0e0e0;
            color: var(--text-dark);
        }

        .btn-reset:hover {
            background: #d0d0d0;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .back-button:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .registration-container {
                margin: 80px 20px;
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>GS KABARE</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">HOME</a></li>
                <li><a href="About us.html" class="nav-link">ABOUT US</a></li>
                <li><a href="academics.html" class="nav-link">ACADEMICS</a></li>
                <li><a href="services.html" class="nav-link">SERVICES</a></li>
                <li><a href="admission.html" class="nav-link">ADMISSION</a></li>
                <li><a href="gallery.html" class="nav-link">GALLERY</a></li>
                <li><a href="contact.html" class="nav-link">CONTACT US</a></li>
                <li><a href="help.html" class="nav-link">HELP</a></li>
            </ul>
        
        </div>
    </nav>

    <div class="registration-container">
        <a href="Services.html" class="back-button">
            <i class="fas fa-arrow-left"></i> Back to Service
        </a>

        <h1>
            <i class="fas fa-edit"></i> New Student Registration Form
        </h1>

        <form id="registrationForm">
            <div class="form-section">
                <h3>Personal Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="dob">Date of Birth <span class="required">*</span></label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender <span class="required">*</span></label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row full">
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="citizenship">Citizenship <span class="required">*</span></label>
                        <input type="text" id="citizenship" name="citizenship" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Address Information</h3>
                <div class="form-row full">
                    <div class="form-group">
                        <label for="address">Street Address <span class="required">*</span></label>
                        <input type="text" id="address" name="address" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City <span class="required">*</span></label>
                        <input type="text" id="city" name="city" required>
                    </div>
                    <div class="form-group">
                        <label for="state">State/Province <span class="required">*</span></label>
                        <input type="text" id="state" name="state" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="zipcode">Zip Code <span class="required">*</span></label>
                        <input type="text" id="zipcode" name="zipcode" required>
                    </div>
                    <div class="form-group">
                        <label for="country">Country <span class="required">*</span></label>
                        <input type="text" id="country" name="country" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Academic Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gradeLevel">Grade Level <span class="required">*</span></label>
                        <select id="gradeLevel" name="gradeLevel" required>
                            <option value="">Select Grade Level</option>
                            <option value="grade1">Grade 1</option>
                            <option value="grade2">Grade 2</option>
                            <option value="grade3">Grade 3</option>
                            <option value="grade4">Grade 4</option>
                            <option value="grade5">Grade 5</option>
                            <option value="grade6">Grade 6</option>
                            <option value="grade7">Grade 7</option>
                            <option value="grade8">Grade 8</option>
                            <option value="grade9">Grade 9</option>
                            <option value="grade10">Grade 10</option>
                            <option value="grade11">Grade 11</option>
                            <option value="grade12">Grade 12</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="previousSchool">Previous School <span class="required">*</span></label>
                        <input type="text" id="previousSchool" name="previousSchool" required>
                    </div>
                </div>
                <div class="form-row full">
                    <div class="form-group">
                        <label for="specialNeeds">Special Educational Needs (if any)</label>
                        <textarea id="specialNeeds" name="specialNeeds" rows="3" placeholder="Describe any special needs or accommodations required"></textarea>
                    </div>
                </div>
            </div>
            <div class="form-section">
                <h3>Parent/Guardian Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="parentName">Parent/Guardian Name <span class="required">*</span></label>
                        <input type="text" id="parentName" name="parentName" required>
                    </div>
                    <div class="form-group">
                        <label for="parentPhone">Parent/Guardian Phone <span class="required">*</span></label>
                        <input type="tel" id="parentPhone" name="parentPhone" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="parentEmail">Parent/Guardian Email <span class="required">*</span></label>
                        <input type="email" id="parentEmail" name="parentEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="relationship">Relationship <span class="required">*</span></label>
                        <select id="relationship" name="relationship" required>
                            <option value="">Select Relationship</option>
                            <option value="mother">Mother</option>
                            <option value="father">Father</option>
                            <option value="guardian">Guardian</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Additional Information</h3>
                <div class="form-row full">
                    <div class="form-group">
                        <label for="interests">Areas of Interest</label>
                        <textarea id="interests" name="interests" rows="3" placeholder="Tell us about your child's interests and hobbies"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn-reset">
                    <i class="fas fa-redo"></i> Clear Form
                </button>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-check"></i> Submit Registration
                </button>
            </div>
        </form>
    </div>

    <script>
       
    </script>
</body>
</html>
